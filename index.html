<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim z dywizjonu jesteś?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: #2c3e50;
            color: #ecf0f1;
        }
        button.glowny {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 2vh;
        }
        button.glowny:hover:not(:disabled) {
            background-color: #c0392b;
        }
        button.glowny:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
        }
        button.glowny:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        button.katalog-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        button.katalog-btn:hover {
            background-color: #2980b9;
        }

        #wynik-kontener {
            margin-top: 40px;
            min-height: 50px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #wynik {
            font-size: 34px;
            font-weight: bold;
            padding: 0 20px;
            transition: opacity 0.3s ease;
        }

        #wylosowany-tier {
            font-size: 16px;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* --- RULETKA (NOWA SEKCJA) --- */
        #ruletka-kontener {
            display: none;
            width: 100%;
            max-width: 600px;
            height: 120px; /* Wysokość na ok. 3 elementy */
            overflow: hidden;
            position: relative;
            background-color: #1a252f;
            border: 2px solid #34495e;
            border-radius: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }
        #ruletka-kursor {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 40px;
            margin-top: -20px; /* Środek */
            border-top: 2px solid #e74c3c;
            border-bottom: 2px solid #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(231,76,60,0.4);
        }
        #ruletka-pasek {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .ruletka-item {
            height: 40px;
            line-height: 40px;
            font-size: 20px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        /* --- KOLORY RZADKOŚCI --- */
        .mityczna {
            background: linear-gradient(270deg, #ff00cc, #3333ff, #ff00cc);
            background-size: 200% 200%;
            animation: fadeEffect 3s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        @keyframes fadeEffect { 
            0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} 
        }

        .legendarna { color: #f1c40f; text-shadow: 0 0 8px rgba(241,196,15,0.5); font-weight: 900; }
        .epicka { color: #9b59b6; font-weight: bold; }
        .rzadka { color: #3498db; font-weight: bold; }
        .niepospolita { color: #2ecc71; font-weight: bold; }
        .zwykla { color: #ecf0f1; }
        .zablokowana {
            color: #7f8c8d !important; font-style: italic; background: none !important;
            -webkit-text-fill-color: #7f8c8d !important; text-shadow: none !important; font-weight: normal;
        }

        /* Sekcja katalogu */
        #katalog-kontener {
            display: none; width: 100%; max-width: 700px; margin-top: 30px;
            background-color: #34495e; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); margin-bottom: 50px;
        }
        #katalog-statystyki {
            text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 20px; color: #bdc3c7;
        }
        .kategoria-tytul {
            margin-top: 20px; margin-bottom: 10px; border-bottom: 2px solid #2c3e50;
            padding-bottom: 5px; font-size: 20px;
        }
        .postac { padding: 8px 10px; font-size: 16px; display: flex; justify-content: space-between; }
        .ilosc { color: #ecf0f1; font-size: 14px; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; }

        /* MENU KONTRAKTÓW */
        #wymiana-sekcja {
            margin-top: 30px; padding: 15px; background-color: #2c3e50; border-radius: 8px; border: 1px solid #1a252f;
        }
        .wymiana-tytul { text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 15px; color: #e67e22; }
        .wymiana-rzad { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #34495e; font-size: 15px; }
        .wymiana-rzad:last-child { border-bottom: none; padding-bottom: 0; }
        .wymiana-btn {
            padding: 8px 12px; background-color: #e67e22; color: white; border: none; border-radius: 5px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .wymiana-btn:disabled { background-color: #7f8c8d; cursor: not-allowed; opacity: 0.5; }
        .wymiana-btn:hover:not(:disabled) { background-color: #d35400; }

        /* UI KREATORA KONTRAKTU */
        #kreator-kontraktu {
            display: none; margin-top: 20px; padding: 15px; background-color: #2c3e50; border-radius: 8px; border: 1px solid #e67e22;
        }
        #kreator-naglowek { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        #kreator-podtytul { text-align: center; font-size: 14px; color: #bdc3c7; margin-bottom: 20px; }
        
        .kreator-sloty { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .slot {
            width: 100px; height: 100px; background-color: #1a252f; border: 2px dashed #7f8c8d; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px;
            cursor: pointer; padding: 5px; transition: 0.2s; user-select: none;
        }
        .slot:hover { border-color: #e74c3c; }
        .slot.zapelniony { border-style: solid; border-color: #e67e22; background-color: #34495e; }
        
        .karta-do-wyboru {
            background-color: #34495e; padding: 10px; margin-bottom: 8px; border-radius: 5px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; user-select: none;
        }
        .karta-do-wyboru:hover { background-color: #3d566e; }
        .karta-do-wyboru.brak { opacity: 0.5; cursor: not-allowed; background-color: #1a252f; }
        
        .kreator-akcje { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn-anuluj { background-color: #c0392b; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-anuluj:hover { background-color: #e74c3c; }
        .btn-zatwierdz { background-color: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-zatwierdz:hover:not(:disabled) { background-color: #2ecc71; }
        .btn-zatwierdz:disabled { background-color: #7f8c8d; cursor: not-allowed; opacity: 0.5; }

    </style>
</head>
<body>

    <button id="przycisk" class="glowny" onclick="losuj()">Jakim mieszkańcem osiedla Dywizjonu 303 jesteś dziś?</button>
    
    <div id="wynik-kontener">
        <div id="ruletka-kontener">
            <div id="ruletka-kursor"></div>
            <div id="ruletka-pasek"></div>
        </div>

        <div id="wynik"></div>
        <div id="wylosowany-tier"></div>
    </div>
    
    <button class="katalog-btn" onclick="pokazUkryjKatalog()">📖 Pokaż katalog postaci</button>

    <div id="katalog-kontener">
        <div id="katalog-statystyki"></div>
        
        <div id="katalog-lista"></div>
        
        <div id="wymiana-sekcja"></div>
        
        <div id="kreator-kontraktu">
            <div id="kreator-naglowek"></div>
            <div id="kreator-podtytul">Kliknij w karty poniżej, aby wrzucić je do kontraktu.</div>
            
            <div class="kreator-sloty" id="kreator-sloty"></div>
            <div id="kreator-karty-lista"></div>
            
            <div class="kreator-akcje">
                <button class="btn-anuluj" onclick="zamknijKreator()">❌ Anuluj</button>
                <button id="btn-zatwierdz" class="btn-zatwierdz" onclick="zatwierdzKontrakt()" disabled>✅ Zatwierdź Kontrakt</button>
            </div>
        </div>
    </div>

    <script>
        const bazaPostaci = [
            { nazwa: "Mityczna", szansa: 0.5, klasa: "mityczna", postaci: ["prof. PK Jakub Klupa", "Klupa doktor matematyki"] },
            { nazwa: "Legendarna", szansa: 2.0, klasa: "legendarna", postaci: ["Jamnik na psychotropach", "Lodowy Bronek", "Bestia z dywizjonu", "Ruben Nersisyan"] },
            { nazwa: "Epicka", szansa: 7.5, klasa: "epicka", postaci: ["Bronek z pocztówką z Tomaszowa Lubelskiego", "Klupa pałujący strajkujących górników kopalni \"Wujek\"", "Julka z jamnikiem", "Bronek pobity przez psychofankę", "Zmora senna Klupy", "Donald Klump", "Vladimir Klupin"] },
            { nazwa: "Rzadka", szansa: 15.0, klasa: "rzadka", postaci: ["Klupa bohater UPA", "Bronek w lateksie", "Klupa pacyfikujący strajk stoczniowców", "TW Jakub K. ps. Bolek", "Benjamin Klupanjahu", "Osama Bin Klupen", "Bronek z Ciechocinka", "Henryk Kluppen - milicja kielecka", "Klupa w Banja Luka"] },
            { nazwa: "Niepospolita", szansa: 30.0, klasa: "niepospolita", postaci: ["Klupa zdrajca ojczyzny", "Bronek z jabłkami", "Klupa głosuję na Adriana nanana na na!", "Klupa na zjeździe narkotykowym", "Losowa kurewka Klupy z klubu studio", "Klupa aktywista antify", "Klupa niebinarny", "Klupa von der Leyen", "Bronek kościelny", "Jamnik w stroju pszczółki Mai", "Klupa monter klimatyzacji", "Klupa z podłogi frytek kupa (4:04)", "Klupa zamachowiec", "Klupa Ostatnie Pokolenie", "Kluppe der Bösewicht", "Ormiański dostawca pizzy"] },
            { nazwa: "Zwykła", szansa: 45.0, klasa: "zwykla", postaci: ["Klupa nierób", "Klupa wieczny student", "Klupa instruktor jazdy", "Klupa bolszewik", "Klupa na kacu po nocy w klubie studio", "Klupa przetyrany", "Klupa nieszczery", "Klupa wróg publiczny", "Klupa posikany", "Klupa przebodźcowany", "Klupa kłamca", "Klupa upadliniec", "Klupa oszust", "Klupa sprzedawczyk", "Klupa konfident", "Klupa eco-friendly", "Klupa kolega Olgierda", "Klupa zwolennik Mercosur", "Klupa ćpun", "Klupa kaucyjny", "Klupa brudny", "Klupa dawca (motocyklista)", "Klupa z kryminału", "Klupa z tatuażykiem", "Klupa z kryształem", "Klupa taksówkarz ukraińców", "Klupa walący z dychy (10 hrywien)", "Klupa ugotowany", "Klupa lewak", "Klupa weganin", "Klupa ZERO (bez cukru)"] }
        ];

        let ekwipunek = {};
        let wybraneDoKontraktu = [];
        let aktywnyKontraktTIndex = -1;

        function zaladujEkwipunek() {
            const zapis = localStorage.getItem('odblokowanePostaci');
            if (zapis) {
                const zdekodowane = JSON.parse(zapis);
                if (Array.isArray(zdekodowane)) {
                    zdekodowane.forEach(postac => { ekwipunek[postac] = 1; });
                    zapiszEkwipunek();
                } else { ekwipunek = zdekodowane; }
            }
        }

        function zapiszEkwipunek() { localStorage.setItem('odblokowanePostaci', JSON.stringify(ekwipunek)); }
        function czekaj(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        function pobierzDzisiejszaDate() { return new Date().toLocaleDateString('pl-PL'); }

        window.onload = function() {
            zaladujEkwipunek();
            generujKatalog();

            const dzisiaj = pobierzDzisiejszaDate();
            if (localStorage.getItem('dataLosowania') === dzisiaj) {
                const wylosowanaKlasa = localStorage.getItem('wynikKlasa');
                const wylosowanaNazwa = localStorage.getItem('wynikTier');
                pokazGotowyWynik(localStorage.getItem('wynikLosowania'), wylosowanaKlasa, wylosowanaNazwa);
            }
        };

        function pokazGotowyWynik(postac, klasaCSS, nazwaTieru) {
            const przycisk = document.getElementById('przycisk');
            const wynik = document.getElementById('wynik');
            const tier = document.getElementById('wylosowany-tier');
            
            przycisk.disabled = true; przycisk.innerText = "Już dziś losowałeś! Wróć jutro.";
            wynik.className = klasaCSS; wynik.innerText = postac;
            wynik.style.display = "block"; // Upewniamy się, że wynik wraca po animacji ruletki
            
            if(nazwaTieru) {
                tier.innerText = `[ Rzadkość: ${nazwaTieru} ]`; tier.className = klasaCSS; tier.style.opacity = 1;
            }
        }

        function wylosujDrop() {
            const roll = Math.random() * 100;
            let skumulowanaSzansa = 0;
            for (let kategoria of bazaPostaci) {
                skumulowanaSzansa += kategoria.szansa;
                if (roll <= skumulowanaSzansa) {
                    const losowyIndeks = Math.floor(Math.random() * kategoria.postaci.length);
                    return { postac: kategoria.postaci[losowyIndeks], klasa: kategoria.klasa, nazwa: kategoria.nazwa };
                }
            }
            const domyslna = bazaPostaci[bazaPostaci.length - 1];
            return { postac: domyslna.postaci[0], klasa: domyslna.klasa, nazwa: domyslna.nazwa };
        }

        async function losuj() {
            const przycisk = document.getElementById('przycisk');
            const wynik = document.getElementById('wynik');
            const tier = document.getElementById('wylosowany-tier');
            const ruletkaKontener = document.getElementById('ruletka-kontener');
            const pasek = document.getElementById('ruletka-pasek');
            
            przycisk.disabled = true; 
            wynik.style.display = "none"; 
            tier.style.opacity = 0;
            ruletkaKontener.style.display = "block"; // Pokazujemy ruletkę
            
            // 1. Wylosowanie właściwego dropu
            const drop = wylosujDrop();
            
            // 2. Budowanie paska losowania (45 elementów żeby długo się kręciło)
            pasek.style.transition = "none";
            pasek.style.transform = "translateY(0)";
            pasek.innerHTML = "";
            
            const iloscElementow = 45;
            const docelowyIndeks = 40; // Zwycięska postać zatrzyma się na tym indeksie
            
            for(let i = 0; i < iloscElementow; i++) {
                let div = document.createElement('div');
                div.className = 'ruletka-item';
                
                let daneItemu;
                if(i === docelowyIndeks) {
                    // Wrzucamy nasz właściwy wynik
                    daneItemu = drop;
                } else {
                    // Losujemy inne postacie na tło maszyny losującej
                    let losowyTier = bazaPostaci[Math.floor(Math.random() * bazaPostaci.length)];
                    let losowaPostac = losowyTier.postaci[Math.floor(Math.random() * losowyTier.postaci.length)];
                    daneItemu = { postac: losowaPostac, klasa: losowyTier.klasa };
                }
                
                div.innerText = daneItemu.postac;
                div.classList.add(daneItemu.klasa);
                pasek.appendChild(div);
            }
            
            // 3. Rozpoczęcie animacji (wymuszenie reflow dla CSS)
            void pasek.offsetWidth;
            
            // Matematyka: Wysokość elementu to 40px. Środek kontenera zaczyna się na 40px (ze 120px całej ramki).
            // Musimy przesunąć pasek tak, by wylosowany item wskoczył w środek.
            const przesuniecie = -(docelowyIndeks * 40 - 40);
            
            // Płynna animacja zwalniająca na końcu
            pasek.style.transition = "transform 4s cubic-bezier(0.1, 0.85, 0.1, 1)";
            pasek.style.transform = `translateY(${przesuniecie}px)`;
            
            // Czekamy aż animacja się skończy + pół sekundy dla efektu
            await czekaj(4500);
            
            // Ukrywamy ruletkę i pokazujemy gotowy złoty tekst
            ruletkaKontener.style.display = "none";
            
            // Zapis do EQ
            ekwipunek[drop.postac] = (ekwipunek[drop.postac] || 0) + 1;
            zapiszEkwipunek(); generujKatalog();
            
            localStorage.setItem('dataLosowania', pobierzDzisiejszaDate());
            localStorage.setItem('wynikLosowania', drop.postac);
            localStorage.setItem('wynikKlasa', drop.klasa);
            localStorage.setItem('wynikTier', drop.nazwa);
            
            pokazGotowyWynik(drop.postac, drop.klasa, drop.nazwa);
        }

        function policzZasobyKategorii(kategoria) {
            let suma = 0;
            kategoria.postaci.forEach(p => { if(ekwipunek[p]) suma += ekwipunek[p]; });
            return suma;
        }

        function pokazUkryjKatalog() {
            const kontener = document.getElementById('katalog-kontener');
            if (kontener.style.display === "none" || kontener.style.display === "") {
                kontener.style.display = "block";
                zamknijKreator();
            } else {
                kontener.style.display = "none";
            }
        }

        function otworzKreator(indexZrodlowy) {
            aktywnyKontraktTIndex = indexZrodlowy;
            wybraneDoKontraktu = [];
            
            document.getElementById('katalog-lista').style.display = "none";
            document.getElementById('wymiana-sekcja').style.display = "none";
            document.getElementById('kreator-kontraktu').style.display = "block";
            
            odswiezKreatorUi();
        }

        function zamknijKreator() {
            aktywnyKontraktTIndex = -1;
            wybraneDoKontraktu = [];
            
            document.getElementById('kreator-kontraktu').style.display = "none";
            document.getElementById('katalog-lista').style.display = "block";
            document.getElementById('wymiana-sekcja').style.display = "block";
            
            generujKatalog();
        }

        function dodajDoSlota(postac) {
            if (wybraneDoKontraktu.length < 5) {
                let uzyteSztuki = wybraneDoKontraktu.filter(x => x === postac).length;
                let posiadaneSztuki = ekwipunek[postac] || 0;
                
                if (posiadaneSztuki > uzyteSztuki) {
                    wybraneDoKontraktu.push(postac);
                    odswiezKreatorUi();
                }
            }
        }

        function usunZeSlota(indeksSlota) {
            if (indeksSlota < wybraneDoKontraktu.length) {
                wybraneDoKontraktu.splice(indeksSlota, 1);
                odswiezKreatorUi();
            }
        }

        function odswiezKreatorUi() {
            let katZrodlowa = bazaPostaci[aktywnyKontraktTIndex];
            let katDocelowa = bazaPostaci[aktywnyKontraktTIndex - 1];
            
            document.getElementById('kreator-naglowek').innerHTML = `KREATOR: <span class="${katZrodlowa.klasa}">${katZrodlowa.nazwa}</span> ➔ <span class="${katDocelowa.klasa}">${katDocelowa.nazwa}</span>`;
            
            const slotyKontener = document.getElementById('kreator-sloty');
            slotyKontener.innerHTML = "";
            for (let i = 0; i < 5; i++) {
                let slot = document.createElement('div');
                if (i < wybraneDoKontraktu.length) {
                    slot.className = `slot zapelniony ${katZrodlowa.klasa}`;
                    slot.innerText = wybraneDoKontraktu[i];
                    slot.title = "Kliknij, aby usunąć ze slotu";
                    slot.onclick = () => usunZeSlota(i);
                } else {
                    slot.className = "slot";
                    slot.innerText = "PUSTE (kliknij kartę poniżej)";
                }
                slotyKontener.appendChild(slot);
            }
            
            const kartyLista = document.getElementById('kreator-karty-lista');
            kartyLista.innerHTML = "";
            
            katZrodlowa.postaci.forEach(postac => {
                let posiadane = ekwipunek[postac] || 0;
                if (posiadane > 0) {
                    let uzyte = wybraneDoKontraktu.filter(x => x === postac).length;
                    let dostepne = posiadane - uzyte;
                    
                    let kartaBtn = document.createElement('div');
                    if (dostepne > 0) {
                        kartaBtn.className = `karta-do-wyboru ${katZrodlowa.klasa}`;
                        kartaBtn.onclick = () => dodajDoSlota(postac);
                    } else {
                        kartaBtn.className = "karta-do-wyboru brak";
                    }
                    kartaBtn.innerHTML = `<span>${postac}</span> <span class="ilosc">Dostępne: ${dostepne} / ${posiadane}</span>`;
                    kartyLista.appendChild(kartaBtn);
                }
            });
            
            document.getElementById('btn-zatwierdz').disabled = wybraneDoKontraktu.length !== 5;
        }

        function zatwierdzKontrakt() {
            if (wybraneDoKontraktu.length !== 5) return;
            
            let katDocelowa = bazaPostaci[aktywnyKontraktTIndex - 1];
            
            wybraneDoKontraktu.forEach(postac => {
                ekwipunek[postac]--;
                if (ekwipunek[postac] <= 0) { delete ekwipunek[postac]; }
            });
            
            let nowaPostac = katDocelowa.postaci[Math.floor(Math.random() * katDocelowa.postaci.length)];
            ekwipunek[nowaPostac] = (ekwipunek[nowaPostac] || 0) + 1;
            
            zapiszEkwipunek();
            alert(`🎉 KONTRAKT ZATWIERDZONY!\n\nWylosowano nowy, wyższy tier:\n⭐ ${nowaPostac} [${katDocelowa.nazwa}]`);
            zamknijKreator();
        }

        function generujKatalog() {
            const lista = document.getElementById('katalog-lista');
            const statystyki = document.getElementById('katalog-statystyki');
            const sekcjaWymiany = document.getElementById('wymiana-sekcja');
            
            lista.innerHTML = "";
            
            let zdobyteUnikalne = Object.keys(ekwipunek).length;
            let wszystkieUnikalne = bazaPostaci.reduce((suma, kategoria) => suma + kategoria.postaci.length, 0);
            
            statystyki.innerText = `Odkryte postaci: ${zdobyteUnikalne} / ${wszystkieUnikalne}`;

            sekcjaWymiany.innerHTML = '<div class="wymiana-tytul">🔄 Menu Kontraktów (Wymiana 5 ➔ 1)</div>';
            
            for(let i = 5; i >= 1; i--) {
                let katZrodlowa = bazaPostaci[i];
                let katDocelowa = bazaPostaci[i-1];
                let posiadaneSztuki = policzZasobyKategorii(katZrodlowa);
                
                let rzad = document.createElement('div');
                rzad.className = 'wymiana-rzad';
                
                let info = document.createElement('span');
                info.innerHTML = `Potrzebujesz 5x <span class="${katZrodlowa.klasa}">${katZrodlowa.nazwa}</span> (Masz w sumie: ${posiadaneSztuki})`;
                
                let przycisk = document.createElement('button');
                przycisk.className = 'wymiana-btn';
                przycisk.innerHTML = `Otwórz kreator dla <span style="font-weight:900;" class="${katDocelowa.klasa}">${katDocelowa.nazwa}</span>`;
                
                if(posiadaneSztuki >= 5) {
                    przycisk.onclick = () => otworzKreator(i);
                } else {
                    przycisk.disabled = true;
                }
                
                rzad.appendChild(info);
                rzad.appendChild(przycisk);
                sekcjaWymiany.appendChild(rzad);
            }

            bazaPostaci.forEach(kategoria => {
                const naglowek = document.createElement('div');
                naglowek.className = `kategoria-tytul ${kategoria.klasa}`;
                naglowek.innerText = `${kategoria.nazwa} (Szansa na drop: ${kategoria.szansa}%)`;
                lista.appendChild(naglowek);

                kategoria.postaci.forEach((postac, indeks) => {
                    const el = document.createElement('div');
                    
                    if (ekwipunek[postac]) {
                        el.className = `postac ${kategoria.klasa}`;
                        el.innerHTML = `<span>${indeks + 1}. ${postac}</span> <span class="ilosc">x${ekwipunek[postac]}</span>`;
                    } else {
                        el.className = "postac zablokowana";
                        el.innerHTML = `<span>${indeks + 1}. ??? (Nieodkryta)</span> <span class="ilosc">x0</span>`;
                    }
                    
                    lista.appendChild(el);
                });
            });
        }
    </script>
